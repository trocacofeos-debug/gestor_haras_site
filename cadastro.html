<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Cadastro</title>

<link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="login-box">

    <h2>Cadastro</h2>

    <input
        id="nome"
        class="input"
        placeholder="Nome"
    >

    <input
        id="email"
        class="input"
        placeholder="Email"
    >

    <input
        id="senha"
        type="password"
        class="input"
        placeholder="Senha"
    >

    <button
        class="btn-login"
        onclick="cadastrar()">

        Cadastrar

    </button>

</div>

<script type="module" src="js/cadastro.js"></script>

</body>
</html>
