<script type="module">


import { db }

from "./js/firebase-config.js";



import {

doc,

getDoc

}

from

"https://www.gstatic.com/firebasejs/12.0.0/firebase-firestore.js";





const area =

document.getElementById(
"detalheCavalo"
);




// PEGA ID DA URL


const parametros =

new URLSearchParams(
window.location.search
);



const cavaloId =

parametros.get(
"id"
);







async function carregarCavalo(){



try{



if(!cavaloId){


throw new Error(
"Nenhum cavalo informado na URL."
);


}




console.log(
"Buscando cavalo:",
cavaloId
);





const referencia =

doc(

db,

"cavalos",

cavaloId

);





const resultado =

await getDoc(
referencia
);






if(!resultado.exists()){


throw new Error(
"Cavalo não encontrado."
);


}






const cavalo =

resultado.data();




console.log(
"Cavalo encontrado:",
cavalo
);







montarPagina(
cavalo
);



}



catch(error){


console.error(
error
);



area.innerHTML = `



<div

class="
col-span-full
text-center
py-20
"

>


<h2

class="
title-font
text-4xl
text-yellow-500
mb-5
"

>

Ops!

</h2>



<p

class="
text-gray-400
text-lg
"

>

${error.message}

</p>



<a

href="index.html"

class="
btn-gold
mt-8
"

>

Voltar para cavalos

</a>



</div>


`;



}



}









function montarPagina(
cavalo
){





const fotoPrincipal =


cavalo.fotoPrincipal ||


cavalo.fotos?.[0] ||


"assets/images/sem-foto.jpg";





const fotos =


cavalo.fotos &&

cavalo.fotos.length > 0

?

cavalo.fotos

:

[fotoPrincipal];







const valor =


Number(
cavalo.preco || 0
)

.toLocaleString(

"pt-BR",

{

style:"currency",

currency:"BRL"

}

);







area.innerHTML = `



<!-- FOTO PRINCIPAL -->


<div>


<div

class="
relative
rounded-[45px]
overflow-hidden
border
border-yellow-500/20
shadow-2xl
"

>


<img

id="fotoPrincipal"

src="${fotoPrincipal}"

alt="${cavalo.nome || 'Cavalo Premium'}"

class="
w-full
h-[600px]
object-cover
"

onerror="
this.src='assets/images/sem-foto.jpg'
"

>



<div

class="
absolute
inset-0
bg-gradient-to-t
from-black
via-transparent
"

></div>



</div>





<!-- GALERIA -->


<div

class="
grid
grid-cols-4
gap-4
mt-6
"

>


${

fotos.map((foto)=>`

src="${foto}"

onclick="trocarFoto('${foto}')"

class="
h-24
w-full
object-cover
rounded-xl
cursor-pointer
border
border-neutral-800
hover:border-yellow-500
transition
"


onerror="
this.src='assets/images/sem-foto.jpg'
"


>



`).join("")

}

// =============================

function configurarWhatsapp(cavalo){


const botao = document.getElementById(
"whatsappCavalo"
);



if(!botao){

return;

}



const numero = "5521999999999";



const mensagem = encodeURIComponent(


`Olá! Tenho interesse no cavalo ${

cavalo.nome || "premium"

} anunciado no Gestor Haras.`


);



botao.href =

`https://wa.me/${numero}?text=${mensagem}`;



}
